<!DOCTYPE html>
<html lang="en" ng-app="deviceApp">
<head>
    <meta charset="UTF-8">
    <title>Vanrise Client Manager</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root{
            --jet-black: #0B0B0B;
            --silver: #C0C0C0;
            --white: #FFFFFF;
            --coral: #FF6F61; /* Coral Glow */
            --blueslate: #6B7F8C; /* Blue slate */
        }

        body { background:var(--white); color:var(--jet-black); font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial; padding-top:64px; }
        .navbar-default{ background:transparent; border:none; padding:14px 20px; position: fixed; top: 0; left: 0; right: 0; width: 100%; z-index: 1000; }
        .navbar-default .navbar-brand{ color:var(--jet-black); font-weight:700; font-size:18px; }
        .navbar-default .navbar-nav>li>a{ color:var(--jet-black); padding:10px 14px; font-weight:600; }
        .navbar-default .navbar-nav>li.active>a{ color:var(--blueslate); border-bottom:3px solid var(--coral); padding-bottom:8px; }
        .page-card{ background:var(--white); border:1px solid var(--silver); padding:28px; border-radius:8px; max-width:980px; margin:0 auto; box-shadow:0 6px 18px rgba(11,11,11,0.04); }
        .page-title{ color:var(--jet-black); font-weight:700; margin-bottom:18px; font-size:20px; text-align:left; }
        .search-bar{ display:flex; gap:12px; align-items:center; margin-bottom:16px; }
        .search-bar .form-control{ height:40px; border:1px solid var(--silver); background:var(--white); color:var(--jet-black); border-radius:6px; }
        .btn-custom{ background:var(--coral); color:var(--white); border:none; height:40px; padding:0 16px; border-radius:6px; font-weight:600; }
        .btn-custom.secondary{ background:var(--blueslate); color:var(--white); }
        .btn-default.btn-sm{ background:transparent; color:var(--jet-black); border:1px solid var(--silver); border-radius:6px; padding:4px 8px; }
        .table{ width:100%; border-collapse:collapse; margin-top:8px; }
        .table th{ text-align:left; padding:12px 8px; color:var(--jet-black); border-bottom:2px solid var(--silver); font-weight:700; }
        .table td{ padding:12px 8px; border-top:1px solid #F4F2F1; color:var(--jet-black); }
        .modal-content{ border:1px solid var(--silver); border-radius:8px; padding:12px; }
        .modal-header .modal-title{ color:var(--jet-black); font-weight:700; }
        .form-control{ background:var(--white); color:var(--jet-black); }
    </style>
</head>
<body>

    <nav class="navbar navbar-default">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" href="Index.html">Vanrise Device Manager</a>
            </div>
            <ul class="nav navbar-nav">
                <li><a href="Index.html">Devices</a></li>
                <li class="active"><a href="Clients.html">Clients</a></li>
                <li><a href="PhoneNumbers.html">Phone Numbers</a></li>
                <li><a href="Reservations.html">Reservations</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-card" ng-controller="ClientController">
        <h2 class="page-title">Client Inventory</h2>

        <div class="search-bar">
            <input type="text" class="form-control" placeholder="Search client..." ng-model="searchName">
            <select class="form-control" ng-model="searchType">
                <option ng-value="''">All Types</option>
                <option ng-value="0">Individual</option>
                <option ng-value="1">Organization</option>
            </select>
            <button class="btn btn-custom" ng-click="search()">Search</button>
            <button class="btn btn-custom" ng-click="openModal()">Add New</button>
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Birth Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="client in clients">
                    <td>{{ client.ID }}</td>
                    <td>{{ client.Name }}</td>
                    <td>{{ client.Type == 0 ? 'Individual' : 'Organization' }}</td>
                    <td>{{ client.BirthDate | date : 'yyyy-MM-dd' }}</td>
                    <td>
                        <button class="btn btn-default btn-sm" ng-click="openModal(client)">Edit</button>
                        <button class="btn btn-default btn-sm" style="color:#d9534f; margin-left:6px;" ng-click="deleteClient(client.ID)">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script type="text/ng-template" id="clientModal.html">
        <div class="modal-header">
            <h3 class="modal-title">{{ title }}</h3>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Name</label>
                <input type="text" class="form-control" ng-model="clientData.Name" placeholder="Client Name" style="height: 40px;">
            </div>
            <div class="form-group">
                <label>Type</label>
                <select class="form-control" ng-model="clientData.Type" ng-change="typeChanged()" style="height: 40px;">
                    <option ng-value="0">Individual</option>
                    <option ng-value="1">Organization</option>
                </select>
            </div>
            <div class="form-group">
                <label>Birth Date</label>
                <input type="date" class="form-control" ng-model="clientData.BirthDate" style="height: 40px;" ng-disabled="clientData.Type == 1">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-default" ng-click="cancel()">Cancel</button>
            <button class="btn btn-custom" ng-click="save()">Save</button>
        </div>
    </script>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.4.8/angular.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular-ui-bootstrap/0.14.3/ui-bootstrap-tpls.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            try {
                var path = window.location.pathname.split('/').pop() || 'Clients.html';
                var links = document.querySelectorAll('.nav.navbar-nav li a');
                links.forEach(function (a) {
                    var href = a.getAttribute('href');
                    if (!href) return;
                    if (href.split('/').pop() === path) {
                        a.parentElement.classList.add('active');
                    } else {
                        a.parentElement.classList.remove('active');
                    }
                });
            } catch (e) { }
        });
    </script>

    <script>
        var app = angular.module('deviceApp', ['ui.bootstrap']);

        app.controller('ClientController', function ($scope, $http, $uibModal) {

            $scope.loadClients = function () {
                $http.get('/api/Clients/GetAll').then(function (response) {
                    $scope.clients = response.data;
                });
            };

            $scope.deleteClient = function(id){
                if(!confirm('Delete this client?')) return;
                $http({ method: 'DELETE', url: '/api/Clients/Delete', params: { id: id } })
                    .then(function(){ $scope.loadClients(); })
                    .catch(function(err){ alert('Delete failed: ' + (err.data || '')); });
            };

            $scope.search = function () {
                var typeParam = ($scope.searchType === '' || typeof $scope.searchType === 'undefined') ? null : parseInt($scope.searchType);
                if ((!$scope.searchName || $scope.searchName === '') && typeParam === null) {
                    $scope.loadClients();
                } else {
                    $http.get('/api/Clients/Search', { params: { name: $scope.searchName, type: typeParam } })
                        .then(function (response) { $scope.clients = response.data; });
                }
            };

            $scope.openModal = function (clientToEdit) {
                var modalInstance = $uibModal.open({
                    templateUrl: 'clientModal.html',
                    controller: 'ModalClientCtrl',
                    resolve: {
                        item: function () { return clientToEdit ? angular.copy(clientToEdit) : null; }
                    }
                });

                modalInstance.result.then(function (resultItem) {
                    if (resultItem.ID) {
                        $http.post('/api/Clients/Update', resultItem).then(function () { $scope.search(); });
                    } else {
                        $http.post('/api/Clients/Add', resultItem).then(function () { $scope.search(); });
                    }
                });
            };

            $scope.loadClients();
        });

        app.controller('ModalClientCtrl', function ($scope, $uibModalInstance, item) {
            $scope.title = item ? "Edit Client" : "Add Client";

            if (item) {
                // Convert BirthDate string to Date object if present
                $scope.clientData = {
                    ID: item.ID,
                    Name: item.Name,
                    Type: item.Type,
                    BirthDate: item.BirthDate ? new Date(item.BirthDate) : null
                };
            } else {
                $scope.clientData = { Name: "", Type: 0, BirthDate: null };
            }

            $scope.typeChanged = function () {
                if ($scope.clientData.Type == 1) {
                    $scope.clientData.BirthDate = null;
                }
            };

            $scope.save = function () {
                // Ensure BirthDate is null when type is Organization
                if ($scope.clientData.Type == 1) $scope.clientData.BirthDate = null;
                $uibModalInstance.close($scope.clientData);
            };
            $scope.cancel = function () { $uibModalInstance.dismiss('cancel'); };
        });
    </script>
</body>
</html>
