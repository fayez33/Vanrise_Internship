<div class="modal-header">
    <h3 class="modal-title">{{ isEdit ? 'Edit Client' : 'Add New Client' }}</h3>
</div>
<div class="modal-body">
    <div class="form-group">
        <label>Client Name:</label>
        <input type="text" class="form-control" ng-model="client.Name" placeholder="Enter client name..." />
    </div>

    <div class="form-group">
        <label>Client Type:</label>
        <client-type-selector selected-type="client.Type"></client-type-selector>
    </div>

    <div class="form-group" ng-show="client.Type === 0">
        <label>Birth Date:</label>
        <input type="date" class="form-control" ng-model="client.BirthDate" />
    </div>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-primary" ng-click="save()">Save</button>
    <button type="button" class="btn btn-default" ng-click="cancel()">Cancel</button>
</div>
