<div class="modal-header">
    <h3 class="modal-title">{{ isEdit ? 'Edit Device' : 'Add New Device' }}</h3>
</div>
<div class="modal-body">
    <div style="margin-bottom: 15px;">
        <div class="modal-header">
            <h3 class="modal-title">{{ isEdit ? 'Edit Device' : 'Add New Device' }}</h3>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Device Name:</label>
                <input type="text" class="form-control" ng-model="device.Name" placeholder="Enter device name..." />
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-default" ng-click="cancel()" style="border-color: #cbd5e0; color: #4a5568; background: transparent; font-weight: bold;">Cancel</button>

            <button class="btn" ng-click="save()" style="background-color: #e67e22; color: white; border-radius: 4px; font-weight: bold;">Save Changes</button>
        </div>
