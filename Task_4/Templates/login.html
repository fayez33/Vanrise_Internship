<div class="login-bg" ng-controller="loginController">
    
    <div class="login-card">
        
        <div class="logo-gradient-mask"></div>
        <h3 style="font-weight: 600; color: #333; margin-bottom: 40px;">System Login</h3>

        <div class="alert alert-danger" ng-show="errorMessage" style="border-radius: 4px; padding: 10px; font-size: 14px;">
            {{ errorMessage }}
        </div>
        
        <form ng-submit="login()">
            <div class="form-group text-left">
                <label style="color: #999; font-weight: normal; font-size: 12px; margin-bottom: 0;">Username</label>
                <input type="text" class="form-control material-input" ng-model="credentials.Username" required autofocus />
            </div>
            
            <div class="form-group text-left" style="margin-top: 25px;">
                <label style="color: #999; font-weight: normal; font-size: 12px; margin-bottom: 0;">Password</label>
                <input type="password" class="form-control material-input" ng-model="credentials.Password" required />
            </div>
            
            <button type="submit" class="btn btn-block login-btn">Login</button>
        </form>
        
        <div style="margin-top: 25px; font-size: 13px;">
            <a href="" ng-click="navigate('/Templates/register.html')" style="color: #7f8c8d; text-decoration: none;">Don't have an account? Register</a>
        </div>
    </div>
</div>
