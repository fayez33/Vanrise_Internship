<div class="container-fluid" ng-controller="loginController" style="display: flex; justify-content: center; margin-top: 100px;">
    <div class="panel panel-default" style="width: 100%; max-width: 400px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <div class="panel-heading" style="background-color: #f8f9fa;">
            <h3 class="panel-title text-center" style="font-weight: bold;">System Login</h3>
        </div>
        <div class="panel-body">
            <div class="alert alert-danger" ng-show="errorMessage">
                {{ errorMessage }}
            </div>

            <form ng-submit="login()">
                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" class="form-control" ng-model="credentials.Username" required autofocus placeholder="Enter username..." />
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" class="form-control" ng-model="credentials.Password" required placeholder="Enter password..." />
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="margin-top: 20px;">
                    <i class="glyphicon glyphicon-log-in"></i> Login
                </button>
            </form>
        </div>
        <div class="text-center" style="margin-top: 15px;">
            <a href="" ng-click="navigate('/Templates/register.html')">Don't have an account? Register here.</a>
        </div>
    </div>
</div>
