<div class="modal-header">
    <h3 class="modal-title">{{ isEdit ? 'Edit Phone Number' : 'Add New Phone Number' }}</h3>
</div>
<div class="modal-body">
    <div class="form-group">
        <label>Phone Number:</label>
        <input type="text" class="form-control" ng-model="phone.Number" placeholder="Enter phone number..." />
    </div>
    
    <div class="form-group">
        <label>Assigned Device:</label>
        <device-selector selected-id="phone.DeviceID"></device-selector>
    </div>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-primary" ng-click="save()">Save</button>
    <button type="button" class="btn btn-default" ng-click="cancel()">Cancel</button>
</div>
