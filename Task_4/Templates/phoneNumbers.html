<div class="container-fluid" ng-controller="phoneNumbersController" ng-init="loadPhoneNumbers()">

    <div style="margin-bottom: 25px;">
        <h2 style="color: #2c3e50; font-weight: 600; margin-top: 0;">Phone Numbers Management</h2>
        <p style="color: #7f8c8d;">Manage the inventory of available and assigned numbers.</p>
    </div>

    <div style="background: white; border-radius: 8px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">

        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;">

            <div style="display: flex; align-items: center; gap: 15px; flex-grow: 1; max-width: 600px;">
                <div style="display: flex; align-items: center; flex-grow: 1;">
                    <i class="glyphicon glyphicon-search" style="color: #95a5a6; margin-right: 10px;"></i>
                    <input type="text" class="form-control" ng-model="searchNumber" placeholder="Search by number..."
                           style="border: none; border-bottom: 1px solid #ccc; border-radius: 0; box-shadow: none; padding-left: 0; flex-grow: 1;" />
                </div>

                <device-selector selected-id="searchDevice" style="min-width: 150px;"></device-selector>

                <button type="button" class="btn" ng-click="search()"
                        style="background-color: #34495e; color: white; border-radius: 4px; padding: 6px 20px;">
                    Search
                </button>
            </div>

            <button type="button" class="btn" ng-click="openModal()" ng-show="userRole === 'Admin'"
                    style="background-color: #e67e22; color: white; border-radius: 4px; font-weight: bold; padding: 6px 20px;">
                <i class="glyphicon glyphicon-plus"></i> Add Phone Number
            </button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover" style="margin-bottom: 0;">
                <thead>
                    <tr style="color: #95a5a6; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;">
                        <th style="border-bottom: 2px solid #edf2f7; padding: 15px 10px;">ID</th>
                        <th style="border-bottom: 2px solid #edf2f7; padding: 15px 10px;">Phone Number</th>
                        <th style="border-bottom: 2px solid #edf2f7; padding: 15px 10px;">Device</th>
                        <th style="border-bottom: 2px solid #edf2f7; padding: 15px 10px; text-align: center;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-repeat="p in phoneNumbers">
                        <td style="vertical-align: middle; padding: 15px 10px; border-top: 1px solid #edf2f7; color: #7f8c8d;"><strong>#{{p.ID}}</strong></td>
                        <td style="vertical-align: middle; padding: 15px 10px; border-top: 1px solid #edf2f7; color: #2c3e50; font-weight: 500;">{{p.Number}}</td>
                        <td style="vertical-align: middle; padding: 15px 10px; border-top: 1px solid #edf2f7; color: #7f8c8d;">{{p.DeviceName}}</td>
                        <td style="vertical-align: middle; padding: 15px 10px; border-top: 1px solid #edf2f7; width: 200px;">
                            <div style="display: flex; flex-wrap: nowrap; gap: 8px; justify-content: center;">
                                <button type="button" class="btn btn-default btn-sm" ng-click="openModal(p)" ng-show="userRole === 'Admin'" style="border-color: #cbd5e0; color: #4a5568; background: transparent;">
                                    <i class="glyphicon glyphicon-edit" style="color: #f39c12;"></i> Edit
                                </button>
                                <button type="button" class="btn btn-default btn-sm" ng-click="delete(p.ID)" ng-show="userRole === 'Admin'" style="border-color: #cbd5e0; color: #4a5568; background: transparent;">
                                    <i class="glyphicon glyphicon-trash" style="color: #e74c3c;"></i> Delete
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr ng-if="phoneNumbers.length === 0">
                        <td colspan="4" style="text-align: center; padding: 30px; color: #a0aec0; border-top: 1px solid #edf2f7;">No phone numbers found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
